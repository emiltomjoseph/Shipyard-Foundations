apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-nginx-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-nginx
  template:
    metadata:
      labels:
        app: my-nginx
    spec:
      containers:
        - name: nginx
          image: my-nginx-app
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          env:
            - name: STUDENT_NAME
              value: "Emil Tom Joseph"